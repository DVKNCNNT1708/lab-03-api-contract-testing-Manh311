name: Newman Contract Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  newman:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Lint OpenAPI contracts
        run: npx @stoplight/spectral-cli lint contracts/*.yaml --fail-severity error

      - name: Start Access Gate and AI Vision mock servers
        run: |
          npx prism mock contracts/access-gate.openapi.yaml -p 4010 --host 0.0.0.0 > prism-gate.log 2>&1 &
          npx prism mock contracts/ai-vision.openapi.yaml -p 4011 --host 0.0.0.0 > prism-vision.log 2>&1 &

      - name: Wait for mock servers to be ready
        run: npx wait-on tcp:localhost:4010 tcp:localhost:4011 --timeout 30000

      - name: Run Newman contract tests
        run: npx newman run postman/collections/FIT4110_lab03_access_gate.postman_collection.json -e postman/environments/FIT4110_lab03_mock.postman_environment.json --reporters cli,junit --reporter-junit-export reports/newman-report-mock.xml

      - name: Show Prism logs on failure
        if: failure()
        run: |
          cat prism-gate.log || true
          cat prism-vision.log || true

      - name: Upload Newman reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-reports
          path: reports/